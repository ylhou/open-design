name: Docker image

# Builds the deploy image on GitHub's runners (so low-memory servers never
# have to compile the Next.js web build locally) and pushes it to ghcr.io.
#
# Triggers:
#   - push to main      → ghcr.io/<owner>/od:edge + :sha-<short>
#   - tag (v*.*.*)       → ghcr.io/<owner>/od:<tag> + :latest
#   - manual dispatch    → same as the ref it runs on
#
# Deploy: on the server set OPEN_DESIGN_IMAGE=ghcr.io/<owner>/od:edge then
#   docker compose -f deploy/docker-compose.yml pull
#   docker compose -f deploy/docker-compose.yml up -d

on:
  push:
    branches: ['main']
    tags: ['v*.*.*']
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/od
          # Tag scheme:
          #   - main           → :edge + :sha-<short> + :main-<timestamp>
          #   - vX.Y.Z         → :X.Y.Z + :latest
          tags: |
            type=ref,event=branch,suffix=-{{date 'YYYYMMDD-HHmmss' tz='UTC'}}
            type=ref,event=tag
            type=raw,value=edge,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=sha,prefix=sha-,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          # amd64 only: the Dockerfile runs a memory-heavy Next.js build, and
          # an emulated (QEMU) arm64 build of it is impractically slow. Most
          # x86 cloud servers only need amd64. To also publish arm64, add a
          # `docker/setup-qemu-action` step and append linux/arm64 here.
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
